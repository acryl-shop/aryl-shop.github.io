// 두께 옵션 동적 제어 함수 (색상 변경 시 두께 옵션 제한)
function updateThickOptionsForColor() {
  const colorSelect = document.getElementById('color');
  const thickSelect = document.getElementById('thick');
  const color = colorSelect.value;
  const prevThick = thickSelect.value;
  // 두께 옵션 전체 목록
  const allThick = [
    {value:'2T', text:'2T'},
    {value:'3T', text:'3T'},
    {value:'5T', text:'5T'},
    {value:'8T', text:'8T'},
    {value:'10T', text:'10T'},
    {value:'15T', text:'15T'},
    {value:'20T', text:'20T'}
  ];
  // 색상별 두께 제한
  let filtered;

  if (color === 'clear') {
    // 투명 → 모든 두께
    filtered = allThick;

  } else if (color === 'white' || color === 'black') {
    // 화이트 / 블랙 → 10T까지
    filtered = allThick.filter(t => t.value !== '15T' && t.value !== '20T');

  } else if (color) {
    // 기타 색상 → 2T ~ 5T
    filtered = allThick.filter(t =>
      t.value === '2T' || t.value === '3T' || t.value === '5T'
    );

  } else {
    filtered = allThick;
  }
  // 옵션 재구성
  thickSelect.innerHTML = '';
  filtered.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.value;
    opt.textContent = t.text;
    thickSelect.appendChild(opt);
  });
  // 이전 두께 유지(가능하면), 아니면 첫 번째 옵션
  if ([...thickSelect.options].some(opt => opt.value === prevThick)) {
    thickSelect.value = prevThick;
  } else {
    thickSelect.selectedIndex = 0;
  }
}
